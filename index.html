<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <title>Ferre-POS</title>
    <style>
      :root {
        color-scheme: light;
        background: #ffffff;
      }

      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #ffffff;
      }

      body {
        overflow: hidden;
        font-family: Roboto, Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .boot-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
        color: #1f2933;
      }

      .boot-panel {
        width: min(360px, calc(100vw - 48px));
        display: grid;
        justify-items: center;
        gap: 0;
        text-align: center;
      }

      .boot-mark {
        width: 74px;
        height: 74px;
        position: relative;
        display: grid;
        place-items: center;
      }

      .boot-mark::before,
      .boot-mark::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 999px;
      }

      .boot-mark::before {
        border: 2px solid rgba(31, 41, 51, 0.1);
      }

      .boot-mark::after {
        border: 2px solid transparent;
        border-top-color: #31c48d;
        border-right-color: #f7b731;
        animation: boot-spin 1.05s linear infinite;
      }

      .boot-icon {
        width: 46px;
        height: 46px;
        display: block;
        object-fit: contain;
        filter: drop-shadow(0 10px 22px rgba(31, 41, 51, 0.16));
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-mark::after {
          animation: none;
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="boot-screen" aria-label="Cargando Ferre-POS">
        <div class="boot-panel">
          <div class="boot-mark" aria-hidden="true">
            <img class="boot-icon" src="/icons/icon.png" alt="" />
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
